<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Yewchat!</title>
        <style>
            body {
                margin: 0;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: #f3f4f6;
                color: #111827;
            }

            .login-shell {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #eef2f7;
            }

            .login-card {
                width: 360px;
                background: #ffffff;
                border: 1px solid #e5e7eb;
                border-radius: 10px;
                padding: 28px;
                box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
            }

            .login-title {
                font-size: 24px;
                font-weight: 700;
                margin-bottom: 8px;
            }

            .login-subtitle {
                font-size: 14px;
                color: #6b7280;
                margin-bottom: 18px;
            }

            .login-form {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .login-input {
                height: 42px;
                border-radius: 8px;
                border: 1px solid #d1d5db;
                padding: 0 12px;
                font-size: 14px;
                outline: none;
            }

            .login-input:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            }

            .login-button {
                height: 42px;
                border: none;
                border-radius: 8px;
                background: #2563eb;
                color: #ffffff;
                font-weight: 600;
                cursor: pointer;
            }

            .login-button:disabled {
                background: #9ca3af;
                cursor: not-allowed;
            }

            .chat-shell {
                min-height: 100vh;
                display: flex;
            }

            .chat-sidebar {
                width: 240px;
                background: #f8fafc;
                border-right: 1px solid #e5e7eb;
                padding: 20px;
            }

            .chat-brand {
                font-size: 20px;
                font-weight: 700;
                margin-bottom: 20px;
            }

            .chat-users-title {
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: #6b7280;
                margin-bottom: 10px;
            }

            .chat-users {
                list-style: none;
                padding: 0;
                margin: 0;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .chat-user {
                padding: 8px 10px;
                background: #ffffff;
                border: 1px solid #e5e7eb;
                border-radius: 6px;
                font-size: 14px;
            }

            .chat-main {
                flex: 1;
                display: flex;
                flex-direction: column;
                background: #f9fafb;
            }

            .chat-header {
                padding: 18px 24px;
                background: #ffffff;
                border-bottom: 1px solid #e5e7eb;
            }

            .chat-title {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 4px;
            }

            .chat-subtitle {
                font-size: 13px;
                color: #6b7280;
            }

            .chat-messages {
                flex: 1;
                padding: 18px 24px;
                overflow-y: auto;
            }

            .chat-empty {
                color: #9ca3af;
                font-size: 14px;
                margin-top: 40px;
            }

            .chat-message {
                background: #ffffff;
                border: 1px solid #e5e7eb;
                border-radius: 8px;
                padding: 12px 14px;
                margin-bottom: 12px;
            }

            .chat-from {
                font-size: 12px;
                font-weight: 700;
                color: #2563eb;
                margin-bottom: 6px;
            }

            .chat-text {
                font-size: 14px;
                color: #111827;
                white-space: pre-wrap;
            }

            .chat-input {
                display: flex;
                gap: 10px;
                padding: 16px 24px;
                background: #ffffff;
                border-top: 1px solid #e5e7eb;
            }

            .chat-input input {
                flex: 1;
                height: 40px;
                border-radius: 8px;
                border: 1px solid #d1d5db;
                padding: 0 12px;
                font-size: 14px;
            }

            .chat-input button {
                height: 40px;
                padding: 0 18px;
                border: none;
                border-radius: 8px;
                background: #2563eb;
                color: #ffffff;
                font-weight: 600;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <script src="yewchat.js"></script>
    </body>
</html>
